<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试书库</title>
</head>
<body>
    <h1>书库测试</h1>
    <div id="status">加载中...</div>
    <div id="books"></div>
    
    <script>
        async function test() {
            const status = document.getElementById('status');
            const booksDiv = document.getElementById('books');
            
            try {
                status.textContent = '正在加载数据...';
                
                // 直接尝试加载
                const response = await fetch('data/book_library.json');
                status.textContent = '收到响应: ' + response.status;
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const text = await response.text();
                status.textContent = '数据长度: ' + text.length;
                
                const data = JSON.parse(text);
                status.textContent = '解析成功! 书籍数量: ' + data.books.length;
                
                // 显示书籍
                booksDiv.innerHTML = data.books.map(b => 
                    '<p>' + b.author + ' - ' + b.title + ' (' + b.char_count + '字)</p>'
                ).join('');
                
            } catch (error) {
                status.textContent = '错误: ' + error.message;
                console.error(error);
            }
        }
        
        test();
    </script>
</body>
</html>
