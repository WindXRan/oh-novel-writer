<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI网文书库</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/export.js"></script>
    <style>
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 100vh;
            padding: 24px 14px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.78);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(18px);
        }
        
        .sidebar-header {
            margin-bottom: 22px;
            padding: 14px 12px 18px;
            border-bottom: 1px solid var(--border-soft);
        }
        
        .sidebar-header h1 {
            position: relative;
            padding-left: 18px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 800;
            line-height: 1.2;
        }
        
        .sidebar-header h1::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0.18em;
            width: 8px;
            height: 1.05em;
            border-radius: var(--radius-pill);
            background: linear-gradient(180deg, var(--accent), var(--info));
        }
        
        .sidebar-subtitle {
            margin-top: 7px;
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 650;
        }
        
        .sidebar-stats {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border-soft);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .stat-label { font-size: 13px; color: var(--text-muted); }
        .stat-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        
        .category-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }
        
        .category-nav ul { list-style: none; }
        
        .category-nav li {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: var(--radius-sm);
        }
        
        .category-nav li:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        
        .category-nav li.active {
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
        }
        
        .category-count {
            font-size: 12px;
            background: var(--surface-soft);
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--text-muted);
        }
        
        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-left h2 { font-size: 20px; font-weight: 600; }
        
        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .search-input {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            width: 260px;
            background: var(--surface);
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        
        .filter-select {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--surface);
            cursor: pointer;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .book-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }
        
        .book-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .book-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            flex: 1;
        }
        
        .book-genre {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .genre-甜宠 { background: #fce7f3; color: #be185d; }
        .genre-虐文 { background: #fee2e2; color: #dc2626; }
        .genre-穿书\/重生 { background: #e0e7ff; color: #4338ca; }
        .genre-总裁文 { background: #fef3c7; color: #b45309; }
        .genre-校园 { background: #d1fae5; color: #059669; }
        .genre-娱乐圈 { background: #f3e8ff; color: #7c3aed; }
        .genre-其他 { background: var(--surface-soft); color: var(--text-muted); }
        
        .book-author { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
        
        .book-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .book-meta span { display: flex; align-items: center; gap: 4px; }
        
        .book-synopsis {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .book-versions {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }
        
        .version-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            margin-bottom: 4px;
        }
        
        .version-source { background: var(--info-soft); color: var(--info); }
        .version-rewrite { background: var(--green-soft); color: var(--green); }
        
        .book-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-secondary); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .books-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="top-nav" id="top-nav"></nav>
    
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📚 本地书库</h1>
                <p class="sidebar-subtitle">AI网文小说项目</p>
            </div>
            
            <div class="sidebar-stats">
                <div class="stat-row">
                    <span class="stat-label">书籍总数</span>
                    <span class="stat-value" id="totalBooks">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">总字数</span>
                    <span class="stat-value" id="totalChars">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">仿写版本</span>
                    <span class="stat-value" id="totalVersions">0</span>
                </div>
            </div>
            
            <nav class="category-nav">
                <ul id="categoryList">
                    <li class="active" onclick="filterByGenre('')">全部 <span class="category-count" id="countAll">0</span></li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h2 id="currentGenre">全部书籍</h2>
                </div>
                <div class="header-right">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索书名、作者、简介...">
                    <select class="filter-select" id="sortSelect" onchange="sortBooks()">
                        <option value="chars">按字数</option>
                        <option value="title">按书名</option>
                        <option value="chapters">按章节数</option>
                        <option value="versions">按版本数</option>
                    </select>
                    <select class="filter-select" id="versionFilter" onchange="filterByVersion()">
                        <option value="all">全部</option>
                        <option value="has-rewrite">有仿写</option>
                        <option value="source-only">仅源文</option>
                    </select>
                    <button class="action-btn" onclick="scanLibrary()">🔄 扫描</button>
                    <button class="action-btn" onclick="exportJSON()">📥 导出</button>
                </div>
            </header>
            
            <section class="books-grid" id="booksGrid"></section>
        </main>
    </div>
    
    <script>
        let allBooks = [];
        let currentGenre = '';
        
        async function loadBooks() {
            try {
                const response = await fetch('data/book_library.json');
                const data = await response.json();
                allBooks = data.books || [];
                
                document.getElementById('totalBooks').textContent = allBooks.length;
                const totalChars = allBooks.reduce((sum, b) => sum + b.char_count, 0);
                document.getElementById('totalChars').textContent = (totalChars / 10000).toFixed(1) + '万';
                
                let totalVersions = 0;
                allBooks.forEach(b => totalVersions += (b.version_count || 1));
                document.getElementById('totalVersions').textContent = totalVersions;
                
                renderBooks();
                updateCategoryList();
            } catch (error) {
                console.error('加载书库失败:', error);
            }
        }
        
        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const versionFilter = document.getElementById('versionFilter').value;
            
            let books = [...allBooks];
            
            if (search) {
                books = books.filter(b => 
                    b.title.toLowerCase().includes(search) ||
                    b.author.toLowerCase().includes(search) ||
                    (b.synopsis || '').toLowerCase().includes(search)
                );
            }
            
            if (currentGenre) {
                books = books.filter(b => b.genre === currentGenre);
            }
            
            if (versionFilter === 'has-rewrite') {
                books = books.filter(b => b.version_count > 1);
            } else if (versionFilter === 'source-only') {
                books = books.filter(b => b.version_count <= 1);
            }
            
            if (books.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>未找到匹配的书籍</h3><p>请尝试其他搜索条件</p></div>';
                return;
            }
            
            grid.innerHTML = books.map((b, idx) => {
                const versions = b.versions || [];
                const hasRewrite = versions.some(v => v.type === 'rewrite');
                
                let versionHtml = '';
                if (versions.length > 1) {
                    versionHtml = '<div class="book-versions">';
                    versions.forEach(v => {
                        const cls = v.type === 'source' ? 'version-source' : 'version-rewrite';
                        const name = v.name || (v.type === 'source' ? '源文' : '仿写');
                        versionHtml += `<span class="version-tag ${cls}">${name}</span>`;
                    });
                    versionHtml += '</div>';
                }
                
                return `
                <div class="book-card" onclick="openBook(${idx})">
                    <div class="book-header">
                        <div class="book-title">${escapeHtml(b.title)}</div>
                        <span class="book-genre genre-${b.genre || '其他'}">${b.genre || '其他'}</span>
                    </div>
                    <div class="book-author">${escapeHtml(b.author)}</div>
                    <div class="book-meta">
                        <span>📝 ${(b.char_count / 10000).toFixed(1)}万字</span>
                        <span>📖 ${b.chapter_count || 0}章</span>
                        ${hasRewrite ? '<span>✍️ 有仿写</span>' : ''}
                    </div>
                    <div class="book-synopsis">${escapeHtml((b.synopsis || '').substring(0, 120))}${(b.synopsis || '').length > 120 ? '...' : ''}</div>
                    ${versionHtml}
                </div>`;
            }).join('');
        }
        
        function updateCategoryList() {
            const list = document.getElementById('categoryList');
            const genres = {};
            allBooks.forEach(b => {
                const g = b.genre || '其他';
                genres[g] = (genres[g] || 0) + 1;
            });
            
            document.getElementById('countAll').textContent = allBooks.length;
            
            list.innerHTML = `<li class="active" onclick="filterByGenre('')">全部 <span class="category-count">${allBooks.length}</span></li>`;
            Object.entries(genres).sort((a, b) => b[1] - a[1]).forEach(([genre, count]) => {
                list.innerHTML += `<li onclick="filterByGenre('${genre}')">${genre} <span class="category-count">${count}</span></li>`;
            });
        }
        
        function filterByGenre(genre) {
            currentGenre = genre;
            document.getElementById('currentGenre').textContent = genre || '全部书籍';
            
            document.querySelectorAll('.category-nav li').forEach(li => li.classList.remove('active'));
            event.target.closest('li').classList.add('active');
            
            renderBooks();
        }
        
        function filterByVersion() {
            renderBooks();
        }
        
        function sortBooks() {
            const sort = document.getElementById('sortSelect').value;
            const grid = document.getElementById('booksGrid');
            const cards = Array.from(grid.children);
            
            cards.sort((a, b) => {
                const idxA = parseInt(a.getAttribute('onclick').match(/\d+/)[0]);
                const idxB = parseInt(b.getAttribute('onclick').match(/\d+/)[0]);
                const bookA = allBooks[idxA];
                const bookB = allBooks[idxB];
                
                if (sort === 'chars') return bookB.char_count - bookA.char_count;
                if (sort === 'title') return bookA.title.localeCompare(bookB.title, 'zh');
                if (sort === 'chapters') return (bookB.chapter_count || 0) - (bookA.chapter_count || 0);
                if (sort === 'versions') return (bookB.version_count || 0) - (bookA.version_count || 0);
                return 0;
            });
            
            cards.forEach(card => grid.appendChild(card));
        }
        
        function openBook(idx) {
            const book = allBooks[idx];
            if (!book) return;
            
            const file = (book.file || '').replace(/\\/g, '/');
            window.open('book.html?file=' + encodeURIComponent(file), '_blank');
        }
        
        async function scanLibrary() {
            if (!confirm('确定要重新扫描书库吗？')) return;
            
            try {
                const response = await fetch('/api/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
                const data = await response.json();
                alert(`扫描完成：${data.total_books}本书，${(data.total_chars / 10000).toFixed(1)}万字`);
                loadBooks();
            } catch (error) {
                alert('扫描失败: ' + error.message);
            }
        }
        
        function exportJSON() {
            const data = JSON.stringify({ books: allBooks }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'book_library.json';
            a.click();
        }
        
        function escapeHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        
        document.getElementById('searchInput').addEventListener('input', renderBooks);
        
        loadBooks();
    </script>
</body>
</html>
